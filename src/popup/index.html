<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrollGuard</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 380px;
        max-height: 560px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 11px 14px 10px;
        border-bottom: 1px solid #1e293b;
        flex-shrink: 0;
      }

      .logo { font-size: 17px; line-height: 1; }

      h1 {
        font-size: 14px;
        font-weight: 700;
        color: #f1f5f9;
        flex: 1;
        letter-spacing: -0.01em;
      }

      .status-pill {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: #64748b;
        max-width: 120px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #22c55e;
        flex-shrink: 0;
      }

      .settings-toggle {
        background: none;
        border: none;
        color: #475569;
        cursor: pointer;
        font-size: 15px;
        padding: 2px 4px;
        border-radius: 3px;
        line-height: 1;
      }

      .settings-toggle:hover { color: #94a3b8; }
      .settings-toggle.active { color: #3b82f6; }

      /* Settings panel */
      .settings-panel {
        background: #0d1f35;
        border-bottom: 1px solid #1e3a5f;
        padding: 12px 14px;
        flex-shrink: 0;
      }

      .settings-panel[hidden] { display: none; }

      .settings-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .settings-row label {
        font-size: 11px;
        color: #64748b;
        width: 110px;
        flex-shrink: 0;
      }

      .settings-row select,
      .settings-row input {
        flex: 1;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 4px;
        color: #e2e8f0;
        font-size: 12px;
        padding: 4px 8px;
        outline: none;
      }

      .settings-row select:focus,
      .settings-row input:focus {
        border-color: #3b82f6;
      }

      .settings-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 4px;
      }

      #settings-status {
        font-size: 11px;
        color: #22c55e;
        flex: 1;
      }

      #settings-status.error { color: #ef4444; }

      .save-btn {
        padding: 4px 12px;
        background: #3b82f6;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
      }

      .save-btn:hover { background: #2563eb; }

      /* Toolbar */
      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px 14px;
        border-bottom: 1px solid #1e293b;
        flex-shrink: 0;
        min-height: 36px;
      }

      #comment-count { font-size: 11px; color: #64748b; }

      .scan-btn {
        padding: 4px 11px;
        background: #3b82f6;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
      }

      .scan-btn:hover { background: #2563eb; }
      .scan-btn:disabled { background: #1e3a5f; color: #4a7abf; cursor: not-allowed; }

      /* Results */
      #results {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
      }

      #results::-webkit-scrollbar { width: 4px; }
      #results::-webkit-scrollbar-track { background: transparent; }
      #results::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

      .result-item {
        padding: 10px 14px;
        border-bottom: 1px solid #1e293b;
      }

      .result-item:last-child { border-bottom: none; }
      .result-item:hover { background: #1e293b44; }

      .result-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
        gap: 8px;
      }

      .result-author {
        font-size: 11px;
        font-weight: 600;
        color: #94a3b8;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .goto-btn {
        padding: 2px 8px;
        background: transparent;
        color: #3b82f6;
        border: 1px solid #1e3a5f;
        border-radius: 3px;
        font-size: 11px;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.1s;
      }

      .goto-btn:hover { background: #1e3a5f; }

      .result-text {
        font-size: 12px;
        color: #94a3b8;
        line-height: 1.45;
        margin-bottom: 6px;
      }

      .result-labels { display: flex; flex-wrap: wrap; gap: 4px; }

      .badge {
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 3px;
        font-weight: 600;
        white-space: nowrap;
        letter-spacing: 0.02em;
      }

      .empty,
      .loading {
        padding: 24px 18px;
        font-size: 12px;
        color: #475569;
        text-align: center;
        line-height: 1.6;
      }

      .footer {
        padding: 7px 14px;
        font-size: 10px;
        color: #475569;
        text-align: center;
        border-top: 1px solid #1e293b;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">🛡</div>
      <h1>TrollGuard</h1>
      <div class="status-pill">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">Loading…</span>
      </div>
      <button class="settings-toggle" id="settings-toggle" title="Settings">⚙</button>
    </div>

    <div class="settings-panel" id="settings-panel" hidden>
      <div class="settings-row">
        <label for="provider-select">Remote analysis</label>
        <select id="provider-select">
          <option value="none">Local rules only</option>
          <option value="perspective">Perspective API</option>
        </select>
      </div>
      <div class="settings-row" id="api-key-row" hidden>
        <label for="api-key-input">API key</label>
        <input
          type="password"
          id="api-key-input"
          placeholder="AIza…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div class="settings-actions">
        <span id="settings-status"></span>
        <button class="save-btn" id="settings-save">Save</button>
      </div>
    </div>

    <div class="toolbar">
      <span id="comment-count"></span>
      <button class="scan-btn" id="scan-btn">Scan page</button>
    </div>

    <div id="results">
      <div class="loading">Scanning…</div>
    </div>

    <div class="footer" id="footer">
      Analysis runs entirely locally · No data leaves your browser
    </div>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
